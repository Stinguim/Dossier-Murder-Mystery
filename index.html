<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOSSIER — Murder Mystery Companion</title>
<link rel="icon" type="image/png" href="assets/monokuma.png">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ═══ EFFECT TYPE → CSS class / accent color ═══
const EFF = {
  buff:       {cls:'tag--buff',       accent:'#2EA85A', bg:'#0A2416', text:'#60D090'},
  debuff:     {cls:'tag--debuff',     accent:'#CC0000', bg:'#280000', text:'#FF7070'},
  punishment: {cls:'tag--punishment', accent:'#880000', bg:'#1A0000', text:'#FF3030'},
  perk:       {cls:'tag--perk',       accent:'#3A6A9A', bg:'#0A1828', text:'#7090C0'},
};
const effKey = t => t==='punição'?'punishment':t;

const teamColor = (name='') => {
  const map={Mastermind:'#880000',Despair:'#CC0000',Student:'#383838',Aluno:'#383838'};
  if(map[name]) return map[name];
  let h=0; for(const c of name) h=c.charCodeAt(0)+((h<<5)-h);
  return `hsl(${Math.abs(h)%360},50%,25%)`;
};
const teamColorText = (name='') => {
  const map={Mastermind:'#FF7070',Despair:'#FF5050',Student:'#C8C4D0',Aluno:'#C8C4D0'};
  if(map[name]) return map[name];
  let h=0; for(const c of name) h=c.charCodeAt(0)+((h<<5)-h);
  return `hsl(${Math.abs(h)%360},65%,68%)`;
};

// ═══ STORAGE ═══
const db={
  async get(k,s=false){try{if(window.storage){const r=await window.storage.get(k,s);return r?.value?JSON.parse(r.value):null;}const raw=localStorage.getItem((s?'sh_':'ps_')+k);return raw?JSON.parse(raw):null;}catch{return null;}},
  async set(k,v,s=false){try{if(window.storage){await window.storage.set(k,JSON.stringify(v),s);return;}localStorage.setItem((s?'sh_':'ps_')+k,JSON.stringify(v));}catch{}},
  async del(k,s=false){try{if(window.storage){await window.storage.delete(k,s);return;}localStorage.removeItem((s?'sh_':'ps_')+k);}catch{}},
};

// ═══ FACTORIES ═══
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const newRuleset=()=>({id:uid(),name:'My Rules',teams:['Mastermind','Despair','Student'],buffLibrary:[],mapLibrary:[],itemLibrary:[],gameNumbers:{investigationDuration:2,trialDuration:10,finalTrialDuration:5,rageDuration:3,autoVoteMultiplier:2}});
const newSession=(rs,host,cohost,map)=>({id:uid(),rulesetSnapshot:{...rs},currentCycle:1,currentPhase:'Day',players:[],deaths:[],currentTrial:null,hostName:host||'',coHostName:cohost||'',mapName:map||'',startedAt:Date.now(),endedAt:null,winningTeam:null,lastModified:Date.now()});
const newPlayer=(name,team,role)=>({id:uid(),name,team,role,alive:true,targetId:null,partnerId:null,effects:[],counters:{},notes:'',voteWeight:1});
const newEffect=(name,type,appliedCycle,durationHours,permanent,description)=>{const cycles=permanent?null:Math.max(1,Math.round((+durationHours||12)/12));return{id:uid(),name,type,appliedCycle,durationCycles:cycles,expiresOnCycle:permanent?null:appliedCycle+cycles,permanent:!!permanent,manuallyExpired:false,description:description||''};};
const newDeath=d=>({id:uid(),...d,accompliceId:d.accompliceId||null,witnessIds:d.witnessIds||[]});
const newTrial=(cycle,mult)=>({id:uid(),cycle,presentPlayerIds:[],votes:{},autoVoteMultiplier:+mult||2,excludedTeams:[],questions:[],accusedId:null,result:null});
const newQuestion=()=>({id:uid(),text:'',answer:null,result:''});

// ═══ HELPERS ═══
const fmtIG=cycles=>{if(!cycles)return'∞ Permanent';const h=cycles*12;if(h%24===0){const d=h/24;return`${h}h (${d} day${d>1?'s':''} IG)`;}return`${h}h IG`;};
const remIG=(e,cycle)=>{if(e.permanent||!e.expiresOnCycle)return null;return Math.max(0,e.expiresOnCycle-cycle)*12;};
const cleanExpired=sess=>{const cycle=sess.currentCycle;let changed=false;const players=sess.players.map(p=>{const effects=p.effects.filter(e=>e.permanent||!e.expiresOnCycle||e.expiresOnCycle>cycle);if(effects.length!==p.effects.length)changed=true;return{...p,effects};});return changed?{...sess,players}:sess;};
const calcVotes=(trial,players)=>{const out={};Object.entries(trial.votes).forEach(([vid,tid])=>{const v=players.find(p=>p.id===vid);if(!v||trial.excludedTeams.includes(v.team))return;const weight=vid===tid?trial.autoVoteMultiplier:(v.voteWeight||1);out[tid]=(out[tid]||0)+weight;});return out;};

// ═══ TIMER HOOK ═══
function useTimers(){
  const[ts,setTs]=useState({});const ref=useRef();
  useEffect(()=>{const tick=()=>{setTs(prev=>{let ch=false;const next={};for(const[k,t]of Object.entries(prev)){if(t.running){const e=Date.now()-t.startedAt;next[k]={...t,elapsed:e};if(e!==t.elapsed)ch=true;}else next[k]=t;}return ch?next:prev;});ref.current=setTimeout(tick,1000);};ref.current=setTimeout(tick,1000);return()=>clearTimeout(ref.current);},[]);
  const start=(k,ms)=>setTs(p=>({...p,[k]:{startedAt:Date.now(),durationMs:ms,elapsed:0,running:true}}));
  const pause=k=>setTs(p=>p[k]?{...p,[k]:{...p[k],running:false}}:p);
  const resume=k=>setTs(p=>p[k]?{...p,[k]:{...p[k],startedAt:Date.now()-p[k].elapsed,running:true}}:p);
  const reset=k=>setTs(p=>{const n={...p};delete n[k];return n;});
  const rem=k=>{const t=ts[k];return t?Math.max(0,t.durationMs-t.elapsed):null;};
  const fmtMs=ms=>{if(ms==null)return null;const s=Math.ceil(ms/1000),m=Math.floor(s/60);return`${m}:${(s%60).toString().padStart(2,'0')}`;};
  return{ts,start,pause,resume,reset,rem,fmtMs};
}

// ═══ LOGO IMAGE ═══
// Swap this path to your own image. Falls back to a text mark if missing —
// the app never looks broken even before you've added the real file.
const LOGO_SRC = 'assets/monokuma.png';
function LogoImage({variant='home'}){
  const[err,setErr]=useState(false);
  const cls = variant==='header' ? 'header-logo-img' : 'home__logo-img';
  if(err) return <div className={`mono ${variant==='header'?'header-logo-fallback':''}`} style={variant==='header'?{}:{fontSize:40,fontWeight:900,color:'var(--red)',textAlign:'center'}}>⚈⚆</div>;
  return <img src={LOGO_SRC} alt="" className={cls} onError={()=>setErr(true)} loading="eager" decoding="async"/>;
}

// ═══ PRIMITIVES ═══
function Btn({children,onClick,variant='default',small,disabled,full,className='',style}){
  return(
    <button onClick={onClick} disabled={disabled}
      className={`btn btn--${variant} ${small?'btn--small':''} ${full?'btn--full':''} ${className}`}
      style={style}>
      {children}
    </button>
  );
}
function Inp({value,onChange,placeholder,type='text',min,max,style,onKeyDown,disabled,className=''}){
  return<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min} max={max} onKeyDown={onKeyDown} disabled={disabled} className={`input ${className}`} style={style}/>;
}
function SelEl({value,onChange,options,style,className=''}){
  return<select value={value} onChange={e=>onChange(e.target.value)} className={`select ${className}`} style={style}>{options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}</select>;
}
const Lbl=({children,style,className=''})=><div className={`label ${className}`} style={style}>{children}</div>;
const Fld=({label,children,style})=><div className="field" style={style}>{label&&<Lbl>{label}</Lbl>}{children}</div>;
const Hr=()=><div className="hr"/>;
function Modal({title,onClose,children,wide}){
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`modal ${wide?'modal--wide':''}`}>
        <div className="modal__header">
          <div className="modal__title">{title}</div>
          <button onClick={onClose} className="modal__close">✕</button>
        </div>
        <div className="modal__body">{children}</div>
      </div>
    </div>
  );
}
function Tag({children,type='buff'}){
  const e=EFF[effKey(type)]||EFF.buff;
  return<span className={`tag ${e.cls}`}>{children}</span>;
}
function Pill({active,activeMuted,onClick,children}){
  const cls = active ? 'pill pill--active' : activeMuted ? 'pill pill--active-muted' : 'pill';
  return<button onClick={onClick} className={cls}>{children}</button>;
}

// ═══ TIMER WIDGET ═══
function TimerWidget({id,label,durMin,T}){
  const{ts,start,pause,resume,reset,rem,fmtMs}=T;
  const t=ts[id];const r=rem(id);const running=t?.running;const expired=r===0;const durMs=durMin*60000;
  const progress=t?Math.max(0,1-t.elapsed/t.durationMs):1;
  const borderColor = expired?'var(--red)':running?'var(--red-dim)':'var(--border)';
  const borderTopColor = expired?'var(--red)':running?'rgba(204,0,0,0.4)':'var(--border)';
  const valueColor = expired?'var(--red)':running?'var(--text)':'var(--text-dim)';
  return(
    <div className="timer" style={{'--timer-border':borderColor,'--timer-border-top':borderTopColor}}>
      <div className="timer__label">{label}</div>
      <div className="timer__value" style={{'--timer-value-color':valueColor,'--timer-value-weight':running?700:400}}>{fmtMs(r)??`${durMin}:00`}</div>
      {t&&<div className="timer__progress"><div className="timer__progress-fill" style={{'--progress':`${progress*100}%`}}/></div>}
      <div className="timer__actions">
        {!t&&<Btn small onClick={()=>start(id,durMs)}>▶</Btn>}
        {t&&running&&<Btn small variant="ghost" onClick={()=>pause(id)}>⏸</Btn>}
        {t&&!running&&r>0&&<Btn small onClick={()=>resume(id)}>▶</Btn>}
        {t&&<Btn small variant="ghost" onClick={()=>reset(id)}>↺</Btn>}
      </div>
    </div>
  );
}

// Self-contained: owns its own ticking state, so the 1s tick only ever
// re-renders this small subtree — never the player grid, modals, or the
// rest of GameScreen. Important for VR where every spare cycle matters.
function TimersPanel({gameNumbers}){
  const T=useTimers();
  return(
    <div className="timers-row">
      <TimerWidget id="invest" label="Investigation" durMin={gameNumbers.investigationDuration} T={T}/>
      <TimerWidget id="trial"  label="Trial"         durMin={gameNumbers.trialDuration}         T={T}/>
      <TimerWidget id="rage"   label="Rage"          durMin={gameNumbers.rageDuration}          T={T}/>
      <TimerWidget id="final"  label="Final Trial"   durMin={gameNumbers.finalTrialDuration}    T={T}/>
    </div>
  );
}

// ═══ PLAYER CARD ═══
// Memoized: re-renders only when this specific player's data or the current
// cycle changes — not when a sibling card, modal, or menu toggles. The
// onClick closure is intentionally excluded from the comparison since it's
// functionally identical across renders (same player id).
const PlayerCard=React.memo(function PlayerCard({player,currentCycle,onClick}){
  const tc=teamColor(player.team);const tcText=teamColorText(player.team);const alive=player.alive;
  const effects=player.effects.filter(e=>!e.manuallyExpired);
  const voteWeight=player.voteWeight||1;
  return(
    <div onClick={onClick} className={`player-card ${alive?'':'player-card--dead'}`} style={{'--accent':alive?tc:undefined}}>
      <div className="player-card__dot" style={{'--dot-color':alive?'var(--green)':'var(--red)','--dot-glow':alive?'rgba(46,168,90,0.5)':'rgba(204,0,0,0.6)'}}/>
      <div className="player-card__name">{player.name}</div>
      <div className="player-card__team" style={{'--team-text':alive?tcText:undefined}}>{player.team}</div>
      {player.role&&(
        <div className="player-card__role-row">
          <div className="player-card__role">{player.role}</div>
          <div className="player-card__votes">🗳{voteWeight}</div>
        </div>
      )}
      {effects.length>0&&(
        <div className="player-card__effects">
          {effects.map(e=>{const rem=remIG(e,currentCycle);const label=e.name.length>7?e.name.slice(0,6)+'…':e.name;const suffix=e.permanent?' ∞':(rem!==null?` ${rem}h`:'');return<Tag key={e.id} type={e.type}>{label}{suffix}</Tag>;})}
        </div>
      )}
    </div>
  );
},(prev,next)=>prev.player===next.player&&prev.currentCycle===next.currentCycle);

// ═══ HOME SCREEN ═══
function HomeScreen({session,onNew,onContinue,onClear}){
  return(
    <div className="home">
      <div className="home__bg-texture"/>
      <div className="home__header">
        <div className="home__eyebrow">◆ Murder Mystery VRChat ◆</div>
        <LogoImage variant="home"/>
        <h1 className="home__title"><span className="title-half--white">DOS</span><span className="title-half--red">SIER</span></h1>
        <div className="home__divider-row">
          <div className="home__divider-line"/>
          <div className="home__divider-text">HOST TERMINAL</div>
          <div className="home__divider-line"/>
        </div>
      </div>
      {session&&(
        <div className="home__session-card">
          <div className="home__session-eyebrow">▶ Active Session</div>
          <div className="home__session-title">{session.mapName||'Unnamed Map'}</div>
          <div className="home__session-meta">Host: {session.hostName||'—'} · {session.currentPhase} {Math.ceil(session.currentCycle/2)}</div>
          <div className="home__session-stats">
            <span className="stats-bar__alive">{session.players.filter(p=>p.alive).length} alive</span>
            <span className="stats-bar__dim">◆</span>
            <span className="stats-bar__dead">{session.players.filter(p=>!p.alive).length} dead</span>
            <span className="stats-bar__dim">◆</span>
            <span className="stats-bar__total">{session.players.length} total</span>
          </div>
          <div className="home__session-actions">
            <Btn variant="primary" onClick={onContinue} className="btn--full">Continue Session</Btn>
            <Btn variant="ghost" small onClick={onClear}>Abandon</Btn>
          </div>
        </div>
      )}
      <Btn variant={session?'default':'primary'} onClick={onNew} style={{minWidth:180,fontSize:14,fontWeight:700,letterSpacing:'0.06em'}}>
        {session?'New Session':'Start Session'}
      </Btn>
    </div>
  );
}

// ═══ SETUP SCREEN ═══
function SetupScreen({rulesets,recentPlayers,lastHostInfo,onComplete,onBack}){
  const[step,setStep]=useState(0);
  const[meta,setMeta]=useState({hostName:lastHostInfo?.hostName||'',coHostName:lastHostInfo?.coHostName||'',mapName:''});
  const[ruleset,setRuleset]=useState(()=>({...rulesets[0]}));
  const[players,setPlayers]=useState([]);
  const[pForm,setPForm]=useState({name:'',team:rulesets[0]?.teams[0]||'',role:''});
  const[teamInput,setTeamInput]=useState(rulesets[0]?.teams.join(', ')||'');
  const[libOpen,setLibOpen]=useState(false);
  const[libForm,setLibForm]=useState({name:'',type:'buff',description:''});
  const[refOpen,setRefOpen]=useState(false);
  const[refTab,setRefTab]=useState('maps');
  const[mapForm,setMapForm]=useState({name:'',notes:''});
  const[itemForm,setItemForm]=useState({name:'',description:''});
  const[showRecent,setShowRecent]=useState(false);
  const teams=teamInput.split(',').map(t=>t.trim()).filter(Boolean);
  const addPlayer=()=>{if(!pForm.name.trim())return;setPlayers(p=>[...p,newPlayer(pForm.name.trim(),pForm.team||teams[0]||'',pForm.role.trim())]);setPForm(p=>({...p,name:'',role:''}));};
  const addRecentPlayer=rp=>{if(players.some(p=>p.name.toLowerCase()===rp.name.toLowerCase()))return;setPlayers(p=>[...p,newPlayer(rp.name,rp.team||teams[0]||'',rp.role||'')]);};
  const addToLib=()=>{if(!libForm.name.trim())return;const item={id:uid(),name:libForm.name.trim(),type:libForm.type,description:libForm.description.trim()};setRuleset(r=>({...r,buffLibrary:[...(r.buffLibrary||[]),item]}));setLibForm(f=>({name:'',type:f.type,description:''}));};
  const removeFromLib=id=>setRuleset(r=>({...r,buffLibrary:r.buffLibrary.filter(x=>x.id!==id)}));
  const addMap=()=>{if(!mapForm.name.trim())return;const m={id:uid(),name:mapForm.name.trim(),notes:mapForm.notes.trim()};setRuleset(r=>({...r,mapLibrary:[...(r.mapLibrary||[]),m]}));setMapForm({name:'',notes:''});};
  const removeMap=id=>setRuleset(r=>({...r,mapLibrary:r.mapLibrary.filter(x=>x.id!==id)}));
  const addItem=()=>{if(!itemForm.name.trim())return;const it={id:uid(),name:itemForm.name.trim(),description:itemForm.description.trim()};setRuleset(r=>({...r,itemLibrary:[...(r.itemLibrary||[]),it]}));setItemForm({name:'',description:''});};
  const removeItem=id=>setRuleset(r=>({...r,itemLibrary:r.itemLibrary.filter(x=>x.id!==id)}));
  const complete=()=>onComplete({...ruleset,teams},meta,players);
  const steps=['Session','Ruleset','Players'];
  // Auto-save ruleset edits (teams, game numbers, effect library) as the host types,
  // so nothing is lost if they back out before starting a game, and next time
  // Setup opens pre-filled with whatever was last configured.
  useEffect(()=>{
    const draft={...ruleset,teams:teams.length?teams:ruleset.teams};
    db.set('rulesets',[draft,...rulesets.slice(1)],false);
  },[ruleset,teamInput]);
  return(
    <div className="setup">
      <div className="setup__header">
        <button onClick={onBack} className="setup__back">←</button>
        <LogoImage variant="header"/>
        <div className="setup__title">New Session</div>
        <div className="setup__header-actions">
          {step>0&&<Btn variant="ghost" small onClick={()=>setStep(s=>s-1)}>Back</Btn>}
          {step<2&&<Btn variant="primary" small onClick={()=>setStep(s=>s+1)} disabled={step===0&&!meta.hostName.trim()}>Next</Btn>}
          {step===2&&<Btn variant="primary" small onClick={complete} disabled={players.length<2}>Start Game</Btn>}
        </div>
      </div>
      <div className="setup__steps">
        {steps.map((lbl,i)=>(
          <div key={i} onClick={()=>i<=step&&setStep(i)} className={`setup__step ${step===i?'setup__step--active':''} ${step>i?'setup__step--done':''}`}>
            <span className="setup__step-label">{step>i?'✓ ':''}{lbl}</span>
          </div>
        ))}
      </div>
      <div className="setup__body">
        {step===0&&<>
          <Fld label="Host *"><Inp value={meta.hostName} onChange={v=>setMeta(m=>({...m,hostName:v}))} placeholder="Your name"/></Fld>
          <Fld label="Co-Host"><Inp value={meta.coHostName} onChange={v=>setMeta(m=>({...m,coHostName:v}))} placeholder="Co-host (optional)"/></Fld>
          <Fld label="Map"><Inp value={meta.mapName} onChange={v=>setMeta(m=>({...m,mapName:v}))} placeholder="Map name"/></Fld>
        </>}
        {step===1&&<>
          <Fld label="Teams (comma-separated)">
            <Inp value={teamInput} onChange={setTeamInput} placeholder="Mastermind, Despair, Student"/>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
              {teams.map(t=><div key={t} className="team-badge" style={{'--accent':teamColor(t)}}>{t}</div>)}
            </div>
          </Fld>
          <Hr/>
          <Lbl>Game Numbers</Lbl>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {[['investigationDuration','Investigation (min)'],['trialDuration','Trial (min)'],['finalTrialDuration','Final Trial (min)'],['rageDuration','Rage (min)'],['autoVoteMultiplier','Self-vote (×)']].map(([k,l])=>(
              <Fld key={k} label={l}><Inp type="number" min="1" value={ruleset.gameNumbers[k]} onChange={v=>setRuleset(r=>({...r,gameNumbers:{...r.gameNumbers,[k]:+v||1}}))}/></Fld>
            ))}
          </div>
          <Hr/>
          <div onClick={()=>setLibOpen(s=>!s)} className="collapsible-header" style={{marginBottom:libOpen?10:0}}>
            <Lbl style={{margin:0}}>Effect Library <span style={{color:'var(--text-muted)',textTransform:'none',fontWeight:400,letterSpacing:0}}>(optional)</span></Lbl>
            <span style={{fontSize:11,color:'var(--text-dim)'}}>{(ruleset.buffLibrary||[]).length>0?`${(ruleset.buffLibrary||[]).length} defined`:'empty'} {libOpen?'▲':'▼'}</span>
          </div>
          {libOpen&&<div>
            <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:10}}>Define effects available in-game. Duration & permanent are chosen when applying.</div>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr auto',gap:7,marginBottom:7}}>
              <Inp value={libForm.name} onChange={v=>setLibForm(a=>({...a,name:v}))} placeholder="Effect name" onKeyDown={e=>e.key==='Enter'&&addToLib()}/>
              <SelEl value={libForm.type} onChange={v=>setLibForm(a=>({...a,type:v}))} options={['buff','debuff','punishment','perk']}/>
              <Btn small variant="primary" onClick={addToLib} disabled={!libForm.name.trim()}>+</Btn>
            </div>
            <Inp value={libForm.description} onChange={v=>setLibForm(a=>({...a,description:v}))} placeholder="What does it do? (optional)" onKeyDown={e=>e.key==='Enter'&&addToLib()} style={{marginBottom:10,fontSize:12}}/>
            {(ruleset.buffLibrary||[]).length===0&&<div style={{fontSize:11,color:'var(--text-muted)',fontStyle:'italic'}}>No effects defined yet</div>}
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {(ruleset.buffLibrary||[]).map(item=>{const e=EFF[effKey(item.type)]||EFF.buff;return(
                <div key={item.id} className="lib-chip" style={{'--chip-bg':e.bg,'--chip-border':e.accent,'--chip-text':e.text}} title={item.description||undefined}>
                  <span className="lib-chip__label">{item.name}{item.description&&<span style={{opacity:0.6,marginLeft:3}}>ⓘ</span>}</span>
                  <button onClick={()=>removeFromLib(item.id)} className="lib-chip__remove">✕</button>
                </div>
              );})}
            </div>
          </div>}
          <Hr/>
          <div onClick={()=>setRefOpen(s=>!s)} className="collapsible-header" style={{marginBottom:refOpen?10:0}}>
            <Lbl style={{margin:0}}>Reference: Maps &amp; Items <span style={{color:'var(--text-muted)',textTransform:'none',fontWeight:400,letterSpacing:0}}>(optional)</span></Lbl>

// ═══ PLAYER MODAL ═══

  const[applyHours,setApplyHours]=useState(12);
  const[applyPermanent,setApplyPermanent]=useState(false);

  const[customForm,setCustomForm]=useState({name:'',type:'buff',description:''});
  const[rolledItem,setRolledItem]=useState(null);
  const teams=session.rulesetSnapshot.teams;
  const library=session.rulesetSnapshot.buffLibrary||[];
  const cycle=session.currentCycle;

  const pOpts=[{value:'',label:'— None'},...others.map(x=>({value:x.id,label:x.name}))];
  const save=upd=>{setP(upd);onUpdate(upd);};
  const handleClose=()=>{onUpdate(p);onClose();};
  const applyEffect=(name,type,hours,permanent,description)=>{const e=newEffect(name,type,cycle,hours,permanent,description);save({...p,effects:[...p.effects,e]});setSelectedLib(null);setRolledItem(null);setApplyHours(12);setApplyPermanent(false);setCustomMode(false);setCustomForm(f=>({name:'',type:f.type,description:''}));};
  const selectLib=item=>{setSelectedLib(item);setRolledItem(null);};
  const rollRandom=()=>{const pool=filterType==='todos'?library:library.filter(e=>e.type===filterType);if(!pool.length)return;const item=pool[Math.floor(Math.random()*pool.length)];setRolledItem(item);setSelectedLib(item);};
  const filteredLib=filterType==='todos'?library:library.filter(e=>e.type===filterType);

      <Lbl>Active Effects ({activeEff.length})</Lbl>

              <button key={t} onClick={()=>{setFilterType(t);setSelectedLib(null);setRolledItem(null);}} className={`pill ${filterType===t?'pill--active':''}`} style={{textTransform:'uppercase',fontWeight:700,letterSpacing:'0.06em'}}>
                {t==='todos'?'All':t} ({count})
              </button>
            );})}
          </div>
          {Object.entries(byType).map(([type,items])=>(
            <div key={type} style={{marginBottom:10}}>

              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {items.map(item=>{const eff=EFF[effKey(item.type)]||EFF.buff;const sel=selectedLib?.id===item.id;return(
                  <button key={item.id} onClick={()=>sel?setSelectedLib(null):selectLib(item)} className={`lib-pill ${sel?'lib-pill--selected':''}`}

                    {item.name}

              </div>
            </div>
          ))}
          {selectedLib&&(()=>{const eff=EFF[effKey(selectedLib.type)]||EFF.buff;return(
            <div className="confirm-apply-panel" style={{'--cap-bg':eff.bg,'--cap-border':eff.accent,'--cap-text':eff.text}}>
              <div className="confirm-apply-panel__head">

              </div>

              <DurRow/>
              {!applyPermanent&&<div className="confirm-apply-panel__meta">{fmtIG(Math.round(applyHours/12))} · expires cycle {cycle+Math.round(applyHours/12)}</div>}
              <Btn variant="primary" full onClick={()=>applyEffect(selectedLib.name,selectedLib.type,applyHours,applyPermanent,selectedLib.description)} style={{fontWeight:700,letterSpacing:'0.06em'}}>Apply {selectedLib.name.toUpperCase()}</Btn>
            </div>
          );})()}
          {!customMode?<button onClick={()=>setCustomMode(true)} style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,fontFamily:'inherit',padding:'4px 0',marginTop:2,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700}}>+ Custom effect</button>:(
            <div className="panel" style={{marginTop:6}}>
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr auto',gap:7,marginBottom:8}}>
                <Inp value={customForm.name} onChange={v=>setCustomForm(a=>({...a,name:v}))} placeholder="Effect name"/>
                <SelEl value={customForm.type} onChange={v=>setCustomForm(a=>({...a,type:v}))} options={['buff','debuff','punishment','perk']}/>
                <button onClick={()=>setCustomMode(false)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:15,padding:'0 4px'}}>✕</button>

          </div>
          <Inp value={customForm.description} onChange={v=>setCustomForm(a=>({...a,description:v}))} placeholder="What does it do? (optional)" style={{marginBottom:8,fontSize:12}}/>

          <Btn variant="primary" full onClick={()=>applyEffect(customForm.name.trim(),customForm.type,applyHours,applyPermanent,customForm.description)} disabled={!customForm.name.trim()}>Apply Effect</Btn>

      <Hr/>

      {Object.entries(p.counters).map(([name,val])=>(

          <Btn small variant="ghost" onClick={()=>{const c={...p.counters};delete c[name];save({...p,counters:c});}}>✕</Btn>
        </div>
      ))}
      <div style={{display:'flex',gap:7,marginBottom:14}}>
        <Inp value={ctrName} onChange={setCtrName} placeholder="New counter..." onKeyDown={e=>{if(e.key==='Enter'&&ctrName.trim()){save({...p,counters:{...p.counters,[ctrName.trim()]:0}});setCtrName('');}}}/>
        <Btn small variant="ghost" disabled={!ctrName.trim()} onClick={()=>{save({...p,counters:{...p.counters,[ctrName.trim()]:0}});setCtrName('');}}>+</Btn>

      <Hr/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <Fld label="Target"><SelEl value={p.targetId||''} onChange={v=>save({...p,targetId:v||null})} options={pOpts}/></Fld>
        <Fld label="Partner / Twin"><SelEl value={p.partnerId||''} onChange={v=>save({...p,partnerId:v||null})} options={pOpts}/></Fld>

      </Fld>
      <Hr/>
      <Btn variant="danger" small onClick={onRemove}>Remove Player</Btn>
    </Modal>
  );

      <Fld label="Killer"><SelEl value={f.killerId} onChange={v=>setF(x=>({...x,killerId:v}))} options={[{value:'',label:'— Unknown'},...all.map(p=>({value:p.id,label:p.name}))]}/></Fld>

      </div>
      <Fld label={`Witnesses (${f.witnessIds.length}) — informative`}>
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {all.filter(p=>p.id!==f.victimId&&p.id!==f.killerId).map(p=>(
            <Pill key={p.id} active={f.witnessIds.includes(p.id)} onClick={()=>togW(p.id)}>{p.name}</Pill>
          ))}
        </div>
        <div style={{fontSize:9,color:'var(--text-dim)',marginTop:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>Never blocks registration — informative only</div>
      </Fld>

        f.accompliceId
          ?<div style={{fontSize:11,color:'var(--text-dim)',marginBottom:14}}>Accomplice: <strong style={{color:'var(--text)'}}>{all.find(p=>p.id===f.accompliceId)?.name}</strong> · <button onClick={()=>setShowAccomplice(true)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:11,fontFamily:'inherit',padding:0}}>change</button></div>
          :<button onClick={()=>setShowAccomplice(true)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:10,fontFamily:'inherit',padding:0,marginBottom:14,textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:600}}>+ Accomplice (uncommon)</button>
      ):(
        <Fld label="Accomplice (uncommon)"><SelEl value={f.accompliceId} onChange={v=>setF(x=>({...x,accompliceId:v}))} options={[{value:'',label:'— None'},...all.filter(p=>p.id!==f.victimId).map(p=>({value:p.id,label:p.name}))]}/></Fld>
      )}
      <div style={{display:'flex',gap:8}}>
        <Btn variant="primary" full onClick={()=>onConfirm(f)} disabled={!f.victimId}>Confirm Death</Btn>
        <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
      </div>
    </Modal>
  );
}

// ═══ TRIAL MODAL ═══
function TrialModal({session,onUpdate,onClose}){
  const rs=session.rulesetSnapshot;
  const[trial,setTrial]=useState(()=>session.currentTrial?{...session.currentTrial}:newTrial(session.currentCycle,rs.gameNumbers.autoVoteMultiplier));
  const[luckTarget,setLuckTarget]=useState(null);
  const alivePlayers=session.players.filter(p=>p.alive);
  const updateTrial=upd=>{setTrial(upd);onUpdate(upd);};
  const totals=useMemo(()=>calcVotes(trial,session.players),[JSON.stringify(trial.votes),JSON.stringify(trial.excludedTeams),trial.autoVoteMultiplier]);
  const ranked=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const getP=id=>session.players.find(p=>p.id===id);
  const tog=(arr,id)=>arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];
  const present=session.players.filter(p=>trial.presentPlayerIds.includes(p.id));
  const updateQ=(qid,patch)=>updateTrial({...trial,questions:trial.questions.map(q=>q.id===qid?{...q,...patch}:q)});
  const trialPhase=trial.cycle%2===1?'Day':'Night';
  const trialDayNum=Math.ceil(trial.cycle/2);
  return(
    <Modal title={`⚖ Trial · ${trialPhase} ${trialDayNum}`} onClose={()=>onClose(trial.result,null,false)} wide>
      <Fld label="Teams excluded from vote count">
        <div style={{fontSize:11,color:'var(--text-dim)',marginBottom:8,lineHeight:1.5}}>
          Votes cast <strong style={{color:'var(--text)'}}>by</strong> players on a selected team won't be counted in the totals below — use this when a team's votes don't count toward the verdict (e.g. excluding Despair during the final trial).
        </div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {rs.teams.map(t=>(
            <Pill key={t} activeMuted={trial.excludedTeams.includes(t)} onClick={()=>updateTrial({...trial,excludedTeams:tog(trial.excludedTeams,t)})}>{t}</Pill>
          ))}
          {rs.teams.length>0&&trial.excludedTeams.length===0&&<span style={{fontSize:10,color:'var(--text-muted)',alignSelf:'center'}}>None excluded — all votes count</span>}
        </div>
        <div style={{fontSize:9,color:'var(--text-dim)',marginTop:8,textTransform:'uppercase',letterSpacing:'0.04em'}}>
          Self-vote ×{trial.autoVoteMultiplier} ·{' '}
          <button onClick={()=>updateTrial({...trial,autoVoteMultiplier:trial.autoVoteMultiplier===2?3:2})} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:9,fontFamily:'inherit',padding:0,textTransform:'uppercase',letterSpacing:'0.04em',fontWeight:700}}>switch to ×{trial.autoVoteMultiplier===2?3:2}</button>
        </div>
      </Fld>
      <Hr/>
      {(()=>{
        const cycleDeaths=session.deaths.filter(d=>d.cycle===trial.cycle);
        const accused=trial.accusedId?getP(trial.accusedId):null;
        return(
          <Fld label="Accusation">
            {cycleDeaths.length>0&&(
              <div style={{marginBottom:10}}>
                {cycleDeaths.map(d=>{
                  const victim=getP(d.victimId);const killer=d.killerId?getP(d.killerId):null;
                  return(
                    <div key={d.id} className="death-record">
                      <div className="death-record__text">
                        <strong style={{color:'var(--text)'}}>{victim?.name||'?'}</strong> was killed{killer&&<> by <strong style={{color:'var(--red)'}}>{killer.name}</strong></>}{d.weapon?<> · {d.weapon}</>:''}{d.location?<> · {d.location}</>:''}
                      </div>
                      {killer&&<button onClick={()=>updateTrial({...trial,accusedId:d.killerId})} className="death-record__accuse-btn">Accuse {killer.name}</button>}
                    </div>
                  );
                })}
              </div>
            )}
            <Lbl style={{marginBottom:6}}>Who do players think did it?</Lbl>
            <SelEl value={trial.accusedId||''} onChange={v=>updateTrial({...trial,accusedId:v||null})} options={[{value:'',label:'— Not decided'},...session.players.map(p=>({value:p.id,label:p.name+(p.alive?'':' (dead)')}))]}/>
            {accused&&cycleDeaths.some(d=>d.killerId)&&(
              cycleDeaths.some(d=>d.killerId===trial.accusedId)
                ?<div className="match-indicator match-indicator--yes">✓ Matches the recorded killer</div>
                :<div className="match-indicator match-indicator--no">✗ Does not match the recorded killer</div>
            )}
          </Fld>
        );
      })()}
      <Hr/>
      <Fld label="Players present">
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {alivePlayers.map(p=>(
            <Pill key={p.id} active={trial.presentPlayerIds.includes(p.id)} onClick={()=>updateTrial({...trial,presentPlayerIds:tog(trial.presentPlayerIds,p.id)})}>{p.name}</Pill>
          ))}
        </div>
      </Fld>
      {present.length>0&&<>
        <Hr/>
        <Lbl>Votes ({Object.keys(trial.votes).filter(k=>present.some(p=>p.id===k)).length}/{present.length})</Lbl>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {present.map(voter=>{const excl=trial.excludedTeams.includes(voter.team);const voted=trial.votes[voter.id]||'';return(
            <div key={voter.id} className={`vote-row ${excl?'vote-row--excluded':''}`}>
              <div className="vote-row__name">{voter.name}{(voter.voteWeight||1)!==1&&<span className="vote-row__weight"> ×{voter.voteWeight}</span>}{excl&&<span className="vote-row__excl-tag"> (excl.)</span>}</div>
              <span className="vote-row__arrow">→</span>
              <div className="vote-row__select">
                <SelEl value={voted} onChange={v=>{const vs={...trial.votes};if(v)vs[voter.id]=v;else delete vs[voter.id];updateTrial({...trial,votes:vs});}} options={[{value:'',label:'— No vote'},...present.filter(q=>q.id!==voter.id).map(q=>({value:q.id,label:q.name})),{value:voter.id,label:`${voter.name} (self ×${trial.autoVoteMultiplier})`}]} style={{fontSize:11,padding:'4px 8px'}}/>
              </div>
            </div>
          );})}
        </div>
      </>}
      {ranked.length>0&&<>
        <Hr/>
        <Lbl>Totals</Lbl>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {ranked.map(([pid,count],i)=>{const pp=getP(pid);return(
            <div key={pid} className="total-row" style={i===0?{'--total-bg':'rgba(204,0,0,0.13)','--total-border':'var(--red)','--total-accent':'var(--red)','--total-count-color':'var(--red)'}:{}}>
              <div className="total-row__name" style={{fontWeight:i===0?700:400}}>{pp?.name||'?'}</div>
              <div className="total-row__count">{count}</div>
            </div>
          );})}
        </div>
      </>}
      <Hr/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <Lbl style={{margin:0}}>Questions ({trial.questions.length}/3)</Lbl>
        {trial.questions.length<3&&<Btn small onClick={()=>updateTrial({...trial,questions:[...trial.questions,newQuestion()]})}>+ Question</Btn>}
      </div>
      {trial.questions.length===0&&<div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>No questions added yet</div>}
      {trial.questions.map((q,i)=>(
        <div key={q.id} className="question-card" style={{'--q-accent':q.answer==='true'?'var(--green)':q.answer==='false'?'var(--red)':'var(--border)'}}>
          <div className="question-card__head">
            <div className="question-card__num" style={{'--q-num-color':q.answer==='true'?'var(--green)':q.answer==='false'?'var(--red)':'var(--text-muted)'}}>Q{i+1}</div>
            <textarea value={q.text} onChange={e=>updateQ(q.id,{text:e.target.value})} placeholder="Question text..." className="question-card__textarea"/>
            <button onClick={()=>updateTrial({...trial,questions:trial.questions.filter(x=>x.id!==q.id)})} className="question-card__remove">✕</button>
          </div>
          <div className="question-card__answers">
            {['true','false'].map(ans=>(
              <button key={ans} onClick={()=>updateQ(q.id,{answer:q.answer===ans?null:ans})} className={`answer-pill ${q.answer===ans?(ans==='true'?'answer-pill--true-active':'answer-pill--false-active'):''}`}>
                {ans==='true'?'TRUE':'FALSE'}
              </button>
            ))}
            {q.answer&&<span className="question-card__answer-tag" style={{color:q.answer==='true'?'var(--green)':'var(--red)'}}>{q.answer==='true'?'✓ True':'✗ False'}</span>}
          </div>
          <div className="question-card__result-row">
            <span className="question-card__arrow">→</span>
            <Inp value={q.result} onChange={v=>updateQ(q.id,{result:v})} placeholder="Outcome / result..." style={{fontSize:11,padding:'5px 10px'}}/>
          </div>
        </div>
      ))}
      <Hr/>
      <Lbl>Result</Lbl>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <Btn variant={trial.result==='correct'?'success':'default'} full onClick={()=>updateTrial({...trial,result:'correct'})} style={{fontWeight:700,letterSpacing:'0.04em'}}>✓ CORRECT</Btn>
        <Btn variant={trial.result==='wrong'?'danger':'default'} full onClick={()=>updateTrial({...trial,result:'wrong'})} style={{fontWeight:700,letterSpacing:'0.04em'}}>✕ WRONG</Btn>
      </div>
      {trial.result==='wrong'&&(
        <div className="luck-game">
          <div className="luck-game__title">☠ LUCK GAME</div>
          <div className="luck-game__desc">Trial failed — optionally select a player to eliminate:</div>
          {!luckTarget?(
            <div className="luck-game__options">
              {alivePlayers.map(p=><button key={p.id} onClick={()=>setLuckTarget(p)} className="luck-game__option">{p.name}</button>)}
            </div>
          ):(
            <div className="luck-game__confirm">
              <div className="luck-game__confirm-text"><div style={{fontSize:12,fontWeight:700}}>Eliminate <span style={{color:'var(--red)'}}>{luckTarget.name}</span>?</div><div style={{fontSize:10,color:'var(--text-dim)'}}>They will be moved to the dead section when you complete the trial</div></div>
              <Btn variant="ghost" small onClick={()=>setLuckTarget(null)}>Back</Btn>
            </div>
          )}
        </div>
      )}
      <Btn variant="primary" full disabled={!trial.result} onClick={()=>onClose(trial.result,luckTarget?.id||null,true)} style={{fontWeight:800,letterSpacing:'0.06em',fontSize:14,padding:'12px 18px'}}>
        ✓ COMPLETE TRIAL{luckTarget?` — ELIMINATE ${luckTarget.name.toUpperCase()}`:''}
      </Btn>
      {!trial.result&&<div className="complete-trial-hint">Choose Correct or Wrong to complete the trial</div>}
      <div style={{textAlign:'center',marginTop:10}}>
        <button onClick={()=>onClose(trial.result,null,false)} className="save-close-link">Save &amp; close without finishing</button>
      </div>
    </Modal>
  );
}

// ═══ ADD PLAYER MODAL ═══
function AddPlayerModal({teams,onAdd,onClose}){
  const[p,setP]=useState({name:'',team:teams[0]||'',role:''});
  const add=()=>{if(p.name.trim())onAdd(newPlayer(p.name.trim(),p.team,p.role.trim()));};
  return(
    <Modal title="Add Player" onClose={onClose}>
      <Fld label="Name"><Inp value={p.name} onChange={v=>setP(x=>({...x,name:v}))} placeholder="Name" onKeyDown={e=>e.key==='Enter'&&add()}/></Fld>
      <Fld label="Team"><SelEl value={p.team} onChange={v=>setP(x=>({...x,team:v}))} options={teams}/></Fld>
      <Fld label="Class"><Inp value={p.role} onChange={v=>setP(x=>({...x,role:v}))} placeholder="Class (optional)" onKeyDown={e=>e.key==='Enter'&&add()}/></Fld>
      <div style={{display:'flex',gap:8}}><Btn variant="primary" full onClick={add} disabled={!p.name.trim()}>Add</Btn><Btn variant="ghost" onClick={onClose}>Cancel</Btn></div>
    </Modal>
  );
}

// ═══ REFERENCE MODAL — quick lookup for maps & items mid-game ═══
function ReferenceModal({session,onClose}){
  const[tab,setTab]=useState('maps');
  const[query,setQuery]=useState('');
  const rs=session.rulesetSnapshot;
  const maps=rs.mapLibrary||[];
  const items=rs.itemLibrary||[];
  const q=query.trim().toLowerCase();
  const filteredMaps=q?maps.filter(m=>m.name.toLowerCase().includes(q)||m.notes.toLowerCase().includes(q)):maps;
  const filteredItems=q?items.filter(it=>it.name.toLowerCase().includes(q)||it.description.toLowerCase().includes(q)):items;
  const list=tab==='maps'?filteredMaps:filteredItems;
  const empty=tab==='maps'?maps.length===0:items.length===0;
  return(
    <Modal title="📖 Reference" onClose={onClose} wide>
      <div className="report-tabs">
        {[['maps',`Maps (${maps.length})`],['items',`Items (${items.length})`]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className="report-tab" style={{'--tab-bg':tab===k?'var(--red)':'var(--surface)','--tab-color':tab===k?'#fff':'var(--text-dim)'}}>{l}</button>
        ))}
      </div>
      <Inp value={query} onChange={setQuery} placeholder={`Search ${tab}...`} style={{marginBottom:12}}/>
      {empty&&<div style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic',textAlign:'center',padding:20}}>
        Nothing defined yet — add {tab} from the Ruleset step next time you set up a session.
      </div>}
      {!empty&&list.length===0&&<div style={{fontSize:12,color:'var(--text-muted)',textAlign:'center',padding:20}}>No match for "{query}"</div>}
      <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:'56vh',overflow:'auto'}}>
        {tab==='maps'&&filteredMaps.map(m=>(
          <div key={m.id} className="ref-entry ref-entry--static">
            <div style={{flex:1}}>
              <div className="ref-entry__name">{m.name}</div>
              {m.notes&&<div className="ref-entry__desc">{m.notes}</div>}
            </div>
          </div>
        ))}
        {tab==='items'&&filteredItems.map(it=>(
          <div key={it.id} className="ref-entry ref-entry--static">
            <div style={{flex:1}}>
              <div className="ref-entry__name">{it.name}</div>
              {it.description&&<div className="ref-entry__desc">{it.description}</div>}
            </div>
          </div>
        ))}
      </div>
    </Modal>
  );
}

function ReportsModal({session,onClose}){
  const[tab,setTab]=useState('results');
  const[highlights,setHighlights]=useState('');
  const[winTeam,setWinTeam]=useState(session.winningTeam||'');
  const[copied,setCopied]=useState('');
  const date=new Date(session.startedAt).toLocaleDateString('en-GB');
  const durMin=Math.round((Date.now()-session.startedAt)/60000);
  const rs=session.rulesetSnapshot;
  const pName=id=>session.players.find(p=>p.id===id)?.name||'?';
  const resultsText=[`**Results · ${session.mapName||'Map'}** — ${date}`,`**Winning Team:** ${winTeam||'???'}`,'','**Players:**',...session.players.map(p=>`• ${p.name} — ${p.role||'—'} (${p.team}) [${p.alive?'Alive':'Dead'}]`),...(highlights?['',`**Highlights:** ${highlights}`]:[])].join('\n');
  const reportText=[date,`Map: ${session.mapName||'?'}`,`Game Time: ${durMin} min`,`Number of Players: ${session.players.length}`,`Host: ${session.hostName||'?'}${session.coHostName?` · Co-Host: ${session.coHostName}`:''}`,''
    ,`I, ${session.hostName||'?'}, declare that all information written here is a genuine, unique and exclusively truthful account of the activity carried out. With this, I honor my word and my duties, opening the possibility for dialogue and further discussion on my performance at this event based on what was reported. I now present my report:`,'','[Write match summary, player behavior, decisions made...]',''
    ,...(session.deaths.length>0?[`Deaths (${session.deaths.length}):`, ...session.deaths.map(d=>`• Cycle ${d.cycle}: ${pName(d.victimId)} was killed${d.killerId?` by ${pName(d.killerId)}`:''} — ${d.weapon||'?'} at ${d.location||'?'}${d.witnessIds.length?` (${d.witnessIds.length} witness(es))`:''}${d.accompliceId?` [accomplice: ${pName(d.accompliceId)}]`:''}`),'']:[])
    ,`In conclusion, [write final conclusions].`,'',`Final Report,`,`${session.hostName||'?'}, ${date}`].join('\n');
  const copy=(text,key)=>{navigator.clipboard?.writeText(text).then(()=>{setCopied(key);setTimeout(()=>setCopied(''),2000);});};
  return(
    <Modal title="Reports" onClose={onClose} wide>
      <div className="report-tabs">
        {[['results','Results'],['report','Host Report']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className="report-tab" style={{'--tab-bg':tab===k?'var(--red)':'var(--surface)','--tab-color':tab===k?'#fff':'var(--text-dim)'}}>{l}</button>
        ))}
      </div>
      {tab==='results'&&<>
        <Fld label="Winning Team"><SelEl value={winTeam} onChange={setWinTeam} options={[{value:'',label:'— TBD'},...rs.teams]}/></Fld>
        <Fld label="Highlights"><textarea value={highlights} onChange={e=>setHighlights(e.target.value)} placeholder="Memorable moments, match highlights..." className="textarea"/></Fld>
        <div className="report-text">{resultsText}</div>
        <Btn variant="primary" full onClick={()=>copy(resultsText,'results')} style={{fontWeight:700}}>{copied==='results'?'✓ Copied!':'Copy to Discord'}</Btn>
      </>}
      {tab==='report'&&<>
        <div className="report-text">{reportText}</div>
        <Btn variant="primary" full onClick={()=>copy(reportText,'report')} style={{fontWeight:700}}>{copied==='report'?'✓ Copied!':'Copy Report'}</Btn>
      </>}
    </Modal>
  );
}

// ═══ GAME SCREEN ═══
function GameScreen({session,onUpdate,onEndGame,onBack}){
  const[modal,setModal]=useState(null);
  const[showMenu,setShowMenu]=useState(false);
  const[confirmEnd,setConfirmEnd]=useState(false);
  const[deadExpanded,setDeadExpanded]=useState(true);
  const rs=session.rulesetSnapshot;
  const alive=session.players.filter(p=>p.alive);
  const dead=session.players.filter(p=>!p.alive);
  const hasExpiredEffects=session.players.some(p=>p.effects.some(e=>!e.permanent&&!e.manuallyExpired&&e.expiresOnCycle&&e.expiresOnCycle<=session.currentCycle));
  const advance=()=>{const newCycle=session.currentCycle+1;const newPhase=session.currentPhase==='Day'?'Night':'Day';onUpdate(cleanExpired({...session,currentCycle:newCycle,currentPhase:newPhase}));};
  const getP=id=>session.players.find(p=>p.id===id);
  const updatePlayer=upd=>onUpdate({...session,players:session.players.map(p=>p.id===upd.id?upd:p)});
  const registerDeath=d=>{const death=newDeath({...d,cycle:session.currentCycle});onUpdate({...session,deaths:[...session.deaths,death],players:session.players.map(p=>p.id===d.victimId?{...p,alive:false}:p)});setModal(null);};
  const updateTrial=trial=>onUpdate({...session,currentTrial:trial});
  const closeTrial=(result,killedId,forceClose)=>{
    let updated={...session};
    const finalized=forceClose||result==='correct'||!!killedId;
    if(finalized){updated.currentTrial=null;}else if(session.currentTrial){updated.currentTrial={...session.currentTrial,result};}
    if(killedId){const death=newDeath({victimId:killedId,killerId:null,weapon:'Luck Game',location:'Trial',cycle:session.currentCycle});updated.deaths=[...updated.deaths,death];updated.players=updated.players.map(p=>p.id===killedId?{...p,alive:false}:p);}
    onUpdate(updated);setModal(null);
  };
  const dismissTrial=()=>onUpdate({...session,currentTrial:null});
  const revivePlayer=id=>onUpdate({...session,players:session.players.map(p=>p.id===id?{...p,alive:true}:p)});
  const removePlayer=id=>onUpdate({...session,players:session.players.filter(p=>p.id!==id)});
  const isDay=session.currentPhase==='Day';
  const dayNumber=Math.ceil(session.currentCycle/2);
  const MBtn=({children,onClick,danger})=><button onClick={onClick} className={`dropdown__item ${danger?'dropdown__item--danger':''}`}>{children}</button>;
  return(
    <div className="game">
      <div className="game__header">
        <button onClick={onBack} className="game__back">←</button>
        <LogoImage variant="header"/>
        <div className="game__logo"><span className="title-half--white">DOS</span><span className="title-half--red">SIER</span></div>
        <div className="game__cycle-wrap">
          <span className="game__cycle-badge" style={{'--cycle-bg':isDay?'transparent':'var(--red)','--cycle-border':isDay?'var(--white)':'var(--red)'}}>
            {isDay?'☀':'☾'} {isDay?'DAY':'NIGHT'} {dayNumber}
          </span>
        </div>
        {hasExpiredEffects&&<div className="game__warning">⚠ effects</div>}
        <button onClick={()=>{setShowMenu(s=>!s);setConfirmEnd(false);}} className="game__menu-btn">⋮</button>
      </div>
      <TimersPanel gameNumbers={rs.gameNumbers}/>
      <div className="stats-bar">
        <span className="stats-bar__alive">{alive.length} ALIVE</span>
        <span className="stats-bar__dim">◆</span>
        <span className="stats-bar__dead">{dead.length} DEAD</span>
        <span className="stats-bar__dim">◆</span>
        <span className="stats-bar__total">{session.players.length} TOTAL</span>
        {session.deaths.length>0&&<><span className="stats-bar__dim">◆</span><span className="stats-bar__deaths">{session.deaths.length} death{session.deaths.length!==1?'s':''}</span></>}
        {session.currentTrial&&<span className="stats-bar__trial">● TRIAL ACTIVE</span>}
      </div>
      <div className="scroll-area">
        {alive.length>0?(
          <div className="player-grid">
            {alive.map(p=><PlayerCard key={p.id} player={p} currentCycle={session.currentCycle} onClick={()=>setModal({type:'player',id:p.id})}/>)}
          </div>
        ):(
          <div className="empty-state">No alive players · use ⋮ to add</div>
        )}
        {dead.length>0&&(
          <div className="dead-section">
            <button onClick={()=>setDeadExpanded(s=>!s)} className={`dead-toggle ${deadExpanded?'dead-toggle--open':''}`}>
              <div className="dead-toggle__diamond"/>
              <span className="dead-toggle__label">Dead ({dead.length})</span>
              <span className="dead-toggle__chevron">{deadExpanded?'▲':'▼'}</span>
            </button>
            {deadExpanded&&(
              <div className="player-grid">
                {dead.map(p=>(
                  <div key={p.id}>
                    <PlayerCard player={p} currentCycle={session.currentCycle} onClick={()=>setModal({type:'player',id:p.id})}/>
                    <div className="dead-action-row">
                      <Btn small variant="success" full onClick={()=>revivePlayer(p.id)}>Revive</Btn>
                      <Btn small variant="ghost" full onClick={()=>removePlayer(p.id)} style={{color:'var(--red)',borderColor:'rgba(204,0,0,0.33)'}}>Remove</Btn>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
      <div className="bottom-bar">
        <Btn onClick={()=>setModal({type:'death'})} variant="danger" full style={{fontWeight:700,letterSpacing:'0.04em'}}>☠ DEATH</Btn>
        <Btn onClick={()=>setModal({type:'trial'})} variant={session.currentTrial?'primary':'default'} full style={{fontWeight:700,letterSpacing:'0.04em'}}>⚖ TRIAL</Btn>
        <Btn onClick={advance} full className="bottom-bar__advance" style={{'--advance-bg':isDay?'var(--red-dim)':'var(--surface-raised)','--advance-color':isDay?'var(--red)':'var(--text)','--advance-border':isDay?'var(--red)':'var(--border)',fontWeight:700,letterSpacing:'0.04em'}}>{isDay?'☾ NIGHT →':'☀ DAY →'}</Btn>
      </div>
      {showMenu&&<>
        <div className="dropdown-overlay" onClick={()=>{setShowMenu(false);setConfirmEnd(false);}}/>
        <div className="dropdown">
          <MBtn onClick={()=>{setModal({type:'addPlayer'});setShowMenu(false);}}>Add Player</MBtn>
          <MBtn onClick={()=>{setModal({type:'reports'});setShowMenu(false);}}>Reports</MBtn>
          <MBtn onClick={()=>{setModal({type:'reference'});setShowMenu(false);}}>📖 Reference</MBtn>
          {session.currentTrial&&<MBtn onClick={()=>{dismissTrial();setShowMenu(false);}}>Dismiss Active Trial</MBtn>}
          <div className="hr" style={{margin:'4px 8px'}}/>
          {!confirmEnd?<MBtn danger onClick={e=>{e.stopPropagation();setConfirmEnd(true);}}>End Game</MBtn>:(
            <div className="dropdown__confirm" onClick={e=>e.stopPropagation()}>
              <div className="dropdown__confirm-text">End current session?</div>
              <div className="dropdown__confirm-actions">
                <Btn small variant="primary" onClick={()=>{onEndGame();setShowMenu(false);setConfirmEnd(false);}}>Yes, end it</Btn>
                <Btn small variant="ghost" onClick={()=>setConfirmEnd(false)}>No</Btn>
              </div>
            </div>
          )}
        </div>
      </>}
      {modal?.type==='player'&&getP(modal.id)&&<PlayerModal player={getP(modal.id)} session={session} onUpdate={updatePlayer} onRemove={()=>{removePlayer(modal.id);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='death'&&<DeathModal session={session} onConfirm={registerDeath} onClose={()=>setModal(null)}/>}
      {modal?.type==='trial'&&<TrialModal session={session} onUpdate={updateTrial} onClose={closeTrial}/>}
      {modal?.type==='addPlayer'&&<AddPlayerModal teams={rs.teams} onAdd={p=>{onUpdate({...session,players:[...session.players,p]});setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal?.type==='reports'&&<ReportsModal session={session} onClose={()=>setModal(null)}/>}
      {modal?.type==='reference'&&<ReferenceModal session={session} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ═══ APP ROOT ═══
function App(){
  const[screen,setScreen]=useState('loading');
  const[session,setSession]=useState(null);
  const[rulesets,setRulesets]=useState([]);
  const[recentPlayers,setRecentPlayers]=useState([]);
  const[lastHostInfo,setLastHostInfo]=useState(null);
  const pollRef=useRef();
  useEffect(()=>{(async()=>{let rs=await db.get('rulesets');if(!rs?.length){rs=[newRuleset()];await db.set('rulesets',rs);}setRulesets(rs);const recent=await db.get('recent_players')||[];setRecentPlayers(recent);const hostInfo=await db.get('host_info');if(hostInfo)setLastHostInfo(hostInfo);const sess=await db.get('session',true);if(sess){setSession(sess);setScreen('game');}else setScreen('home');})();},[]);
  useEffect(()=>{if(screen!=='game'){clearInterval(pollRef.current);return;}pollRef.current=setInterval(async()=>{const remote=await db.get('session',true);if(remote&&remote.lastModified>(session?.lastModified||0))setSession(remote);},5000);return()=>clearInterval(pollRef.current);},[screen,session?.lastModified]);
  const save=useCallback(async sess=>{const s={...sess,lastModified:Date.now()};setSession(s);await db.set('session',s,true);return s;},[]);
  const startSession=async(rs,meta,players)=>{const sess=newSession(rs,meta.hostName,meta.coHostName,meta.mapName);sess.players=players;await save(sess);const idx=rulesets.findIndex(r=>r.id===rs.id);const updRs=idx>=0?rulesets.map((r,i)=>i===idx?rs:r):[...rulesets,rs];setRulesets(updRs);await db.set('rulesets',updRs);const names=new Set(players.map(p=>p.name.toLowerCase()));const filtered=recentPlayers.filter(r=>!names.has(r.name.toLowerCase()));const newRecent=[...players.map(p=>({name:p.name,team:p.team,role:p.role})),...filtered].slice(0,30);setRecentPlayers(newRecent);await db.set('recent_players',newRecent);const hostInfo={hostName:meta.hostName,coHostName:meta.coHostName};setLastHostInfo(hostInfo);await db.set('host_info',hostInfo);setScreen('game');};
  const endSession=async()=>{if(session)await save({...session,endedAt:Date.now()});await db.del('session',true);setSession(null);setScreen('home');};
  if(screen==='loading')return<div style={{height:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--red)',fontFamily:'var(--font-mono)',fontSize:13,letterSpacing:'0.2em',fontWeight:700}}>LOADING…</div>;
  if(screen==='home')return<HomeScreen session={session} onNew={()=>setScreen('setup')} onContinue={()=>setScreen('game')} onClear={endSession}/>;
  if(screen==='setup')return<SetupScreen rulesets={rulesets} recentPlayers={recentPlayers} lastHostInfo={lastHostInfo} onComplete={startSession} onBack={()=>setScreen('home')}/>;
  if(screen==='game'&&session)return<GameScreen session={session} onUpdate={save} onEndGame={endSession} onBack={()=>setScreen('home')}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
